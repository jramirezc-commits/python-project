name: Factory Version
run-name: Factory Version

on:
  push:
    branches:
      - release
      - main

jobs:
  generate-version:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.generate-new-id.outputs.VERSION }}
    steps:
      - name: Generating New Version
        id: 'generate-new-id'
        run: echo "VERSION=v1.0-${{ github.run_id }}" >> $GITHUB_OUTPUT

  show-new-version:
    needs: generate-version
    runs-on: ubuntu-latest
    steps:
      - name: Show Version
        run: echo "Empaquetando la versión:${{ needs.generate-version.outputs.new-version }}"

  run-security-template:
    uses: ./.github/workflows/security-template.yml
    with:
      programing_lenguage: 'Node.js'